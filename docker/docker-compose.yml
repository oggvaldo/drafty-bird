services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: drafty-bird:local
    ports:
      - '8080:8080'
    environment:
      PORT: 8080
      SCORE_DB_PATH: /data/db.sqlite
      WEB_DIST_DIR: /app/public
      CHAOS_ENABLED: 'false'
    volumes:
      - drafty_bird_data:/data

volumes:
  drafty_bird_data:
